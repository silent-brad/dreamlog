{% extends "base.html" %}

{% block title %}Tags — {{ site.name }}{% endblock %}

{% block header %}
  <header>
    <nav><a href="/">← Home</a></nav>
  </header>
{% endblock %}

{% block content %}
    <h1>Tags</h1>
    <ul class="tag-list">
{%- for tag in tags %}
      <li><a href="{{ tag.url }}">{{ tag.name }}</a> ({{ tag.count }})</li>
{%- endfor %}
    </ul>
{% endblock %}
