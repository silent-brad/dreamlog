{% extends "base.html" %}

{% block title %}{{ heading }} — {{ site.name }}{% endblock %}

{% block header %}
  <header>
    <nav><a href="/">← Home</a></nav>
  </header>
{% endblock %}

{% block content %}
    <h1>{{ heading }}</h1>
    <ul>
{%- for link in links %}
      <li><a href="{{ link.url }}">{{ link.name }}</a></li>
{%- endfor %}
    </ul>
{% endblock %}
