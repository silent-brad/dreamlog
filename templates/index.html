{% extends "base.html" %}

{% block content %}
    <h1>{{ site_name }}</h1>
    <p class="subtitle">Served by a unikernel.</p>
    <ul class="post-list">
{%- for post in posts %}
      <li>
        <a href="/{{ post.slug }}">{{ post.title }}</a>
        <time datetime="{{ post.date }}">{{ post.date }}</time>
      </li>
{%- endfor %}
    </ul>
{% endblock %}
